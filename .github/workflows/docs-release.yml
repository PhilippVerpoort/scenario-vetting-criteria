name: Docs (release)

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  deploy-release-docs:
    name: Build and deploy versioned docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -

      - name: Sync dependencies for docs
        run: |
          poetry install --with docs

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Install R and IRkernel
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base libzmq3-dev
          sudo Rscript -e "install.packages('IRkernel', repos='https://cloud.r-project.org')"
          mkdir -p /tmp/ir_kernel
          printf '{"argv":["/usr/bin/R","--slave","-e","IRkernel::main()","--args","{connection_file}"],"display_name":"R","language":"R"}' \
            > /tmp/ir_kernel/kernel.json
          poetry run jupyter kernelspec install /tmp/ir_kernel --name ir --user

      - name: Run mike to deploy mkdocs as versioned release
        env:
          LD_LIBRARY_PATH: ""
        run: |
          poetry run mike deploy ${{ steps.version.outputs.version }} stable --alias-type=symlink --update-aliases
          poetry run mike set-default latest

      - name: Push gh-pages branch
        run: |
          git push origin gh-pages
