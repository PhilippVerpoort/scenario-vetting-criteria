        with historical values. This is a concern because the underlying modelling 
        likely makes false assumptions on the current state of food availability 
        and the effort required to reach net-zero emissions while growing 
        sufficient food for the world population.
    justification_threshold: >-
        Historical values are provided by the Food and Agriculture Organization 
        of the United Nations {{citep:FAOSTAT-2026}}.

        
        The thresholds are derived from these sources as follows:

        • 2010, 2015, and 2020: ±20% deviation will lead to exclusion.

        • 2025: ±30% deviation will lead to exclusion.


        Note that these ranges not only give models some leeway to deviate, but 
        also account for uncertainty in the underlying data sources. To further 
        account for uncertainty in the historical values, the most permissible 
        source of all sources for each variable, region, and period is used to 
        set the threshold.


        The threshold for 2025 is set to the value reported for 2020.
Land Cover|{Component}:
    replacements:
        Component:
            ~:
                component: land cover
            Cropland:
                component: crop-land land cover
            Forest:
                component: forest land cover
            Pasture:
                component: pasture land cover
    justification_criterion: >-
        This scenario reports {component} that is inconsistent with historical
        values. This is a concern because the underlying modelling likely makes 
        false assumptions on land cover today and the efforts needed to reduce 
        emissions while feeding the planet.
    justification_threshold: >-
        Historical values for land cover are provided by {{cite:LUH2-2020}},
        {{cite:LUH2-GCB-2025}}, {{cite:LUH3-2026}}, and {{cite:FAOSTAT-2026}}.
        
        
        The thresholds are derived from these sources as follows:

        • 2010, 2015, and 2020: ±10% deviation for land cover and ±20% for 
        crop-land cover.

        • 2025: ±20% deviation for land cover and ±30% for crop-land cover.


        Note that these ranges not only give models some leeway to deviate, but 
        also account for uncertainty in the underlying data sources. To further 
        account for uncertainty in the historical values, the most permissible 
        source of all sources for each variable, region, and period is used to 
        set the threshold.


        The threshold for 2025 is set to the value reported for 2020.
"Primary Energy|{Primary Fossil Fuel}":
    replacements:
        Primary Fossil Fuel:
            Coal:
                fuel_name: coal
            Gas:
                fuel_name: gas
            Oil:
                fuel_name: oil
            Nuclear:
                fuel_name: nuclear
    justification_criterion: >-
        This scenario reports {fuel_name} primary energy production that is
        inconsistent with historical values. This is a concern because the
        underlying modelling likely makes false assumptions on the mitigation
        effort required to reach net-zero emissions.
    justification_threshold: >-
        Historical values are provided by the International Energy Agency
        {{citep:IEA-EB-2025}}.


        The thresholds are derived from these sources for years 2010, 2015,
        2020, and 2025 as follows:

        • Single region: ±35% deviation will lead to exclusion, ±25% will lead
        to a red flag.

        • Whole world: ±25% deviation will lead to exclusion, ±15% will lead
        to a red flag.


        Note that these ranges not only give models some leeway to deviate, but
        also account for uncertainty in the underlying data sources. To further
        account for uncertainty in the historical values, the most permissible
        source of all sources for each variable, region, and period is used to
        set the threshold.


        The threshold for 2025 is derived from data in 2022 and 2023 through
        linear extrapolation. Due to the COVID-19 shock in 2020, a wider
        tolerance of ±40% is applied for that year instead of ±25%. The
        threshold for 2020 is derived using both the exact value in 2020 and
        the value averaged over the period Jan 2018 till Dec 2022, taking
        whichever is more permissive for the scenario in question.
