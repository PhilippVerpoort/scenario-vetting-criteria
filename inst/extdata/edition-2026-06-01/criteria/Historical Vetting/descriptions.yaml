"Emissions|{AFOLU Emission Components}":
    replacements:
        AFOLU Emission Components:
            CO2|AFOLU:
                sectors: agriculture, forestry, and land-use
                species: CO2
                sources: "{{cite:EDGAR-2025}}, {{cite:FAOSTAT-2026}}, {{cite:GCB-2025}}, {{cite:Hansis-2015}}, {{cite:Houghton-2023}}, {{cite:OSCAR-GCB-2023}}, {{cite:PRIMAP-2025-v2p7}}, and {{cite:Qin-2024}}"
            CO2|AFOLU|Land:
                sectors: forestry and other land use and land use change
                species: CO2
                sources: "{{cite:Gasser-2020}}, {{cite:GCB-2025}}, and {{cite:OSCAR-GCB-2023}}"
            CH4|AFOLU|Agriculture:
                sectors: agriculture
                species: CH4
                sources: "{{cite:EDGAR-2025}}, {{cite:FAOSTAT-2026}}, {{cite:PRIMAP-2025-v2p7}}"
            N2O|AFOLU|Agriculture:
                sectors: agriculture
                species: N2O
                sources: "{{cite:EDGAR-2025}}, {{cite:FAOSTAT-2026}}, {{cite:PRIMAP-2025-v2p7}}"
    justification_criterion: >-
        This scenario reports {species} emissions from {sectors} that are
        inconsistent with historical values. This is a concern because the
        underlying modelling likely makes false assumptions on the remaining
        GHG emissions budget and the mitigation effort required to reach
        net-zero emissions.
    justification_threshold: >-
        Historical values for {species} emissions from {sectors} are provided by
        {sources}.

        
        The thresholds are derived from these sources as follows:

        • 2010, 2015, and 2020: ±20% deviation will lead to exclusion.

        • 2025: ±30% deviation will lead to exclusion.


        Note that these ranges not only give models some leeway to deviate, but 
        also account for uncertainty in the underlying data sources. To further 
        account for uncertainty in the historical values, the most permissible 
        source of all sources for each variable, region, and period is used to 
        set the threshold.


        The threshold for 2025 is set to the value reported for 2020.
Emissions|CO2|Energy and Industrial Processes:
    justification_criterion: >-
        This scenario reports CO2 emissions in the energy supply, energy demand,
        and industry sectors that are inconsistent with historical values. This 
        is a concern because the underlying modelling likely makes false 
        assumptions on the remaining GHG emissions budget and the mitigation 
        effort required to reach net-zero emissions.
    justification_threshold: >-
        Historical values are provided by the Community Emissions Data System 
        {{citep:CEDS-2025}}.


        The thresholds are derived from these sources as follows:

        • Single region: ±35% deviation will lead to exclusion.

        • Whole world: ±25% deviation will lead to exclusion.


        Note that these ranges not only give models some leeway to deviate, but 
        also account for uncertainty in the underlying data sources. To further 
        account for uncertainty in the historical values, the most permissible 
        source of all sources for each variable, region, and period is used to 
        set the threshold.


        The threshold for 2025 is derived from data in 2022 and 2023 through 
        linear extrapolation. Due to the COVID-19 shock in 2020, the threshold 
        value can be either the exact value in 2020 or the value averaged over 
        the period Jan 2018 till Dec 2022, whichever is more permissible for 
        the scenario in question.
Cropland Yields:
    justification_criterion: >-
        This scenario reports crop-land yields that are inconsistent with 
        historical values. This is a concern because the underlying modelling 
        likely makes false assumptions on the crop-land yields and the effort 
        required to reach net-zero emissions while feeding the population of 
        the world.
    justification_threshold: >-
        Historical values are provided by the Food and Agriculture Organization 
        of the United Nations {{citep:FAOSTAT-2026}}.


        The thresholds are derived from these sources as follows:

        • 2010, 2015, and 2020: ±20% deviation will lead to exclusion.

        • 2025: ±30% deviation will lead to exclusion.


        Note that these ranges not only give models some leeway to deviate, but 
        also account for uncertainty in the underlying data sources. To further 
        account for uncertainty in the historical values, the most permissible 
        source of all sources for each variable, region, and period is used to 
        set the threshold.


        The threshold for 2025 is set to the value reported for 2020.
