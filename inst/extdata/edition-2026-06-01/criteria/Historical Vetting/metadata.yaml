    justification_criterion: >-
        This scenario reports crop-land yields that are inconsistent with 
        historical values. This is a concern because the underlying modelling 
        likely makes false assumptions on the crop-land yields and the effort 
        required to reach net-zero emissions while feeding the population of 
        the world.
    justification_threshold: >-
        Historical values are provided by the Food and Agriculture Organization 
        of the United Nations {{citep:FAOSTAT-2025}}.


        The thresholds are derived from these sources as follows:

        • 2010, 2015, and 2020: ±20% deviation will lead to exclusion.

        • 2025: ±30% deviation will lead to exclusion.


        Note that these ranges not only give models some leeway to deviate, but 
        also account for uncertainty in the underlying data sources. To further 
        account for uncertainty in the historical values, the most permissible 
        source of all sources for each variable, region, and period is used to 
        set the threshold.


        The threshold for 2025 is set to the value reported for 2020.
Food Availability:
    justification_criterion: >-
        This scenario reports levels of food availability that are inconsistent 
        with historical values. This is a concern because the underlying modelling 
        likely makes false assumptions on the current state of food availability 
        and the effort required to reach net-zero emissions while growing 
        sufficient food for the world population.
    justification_threshold: >-
        Historical values are provided by the Food and Agriculture Organization 
        of the United Nations {{citep:FAOSTAT-2025}}.

        
        The thresholds are derived from these sources as follows:

        • 2010, 2015, and 2020: ±20% deviation will lead to exclusion.

        • 2025: ±30% deviation will lead to exclusion.


        Note that these ranges not only give models some leeway to deviate, but 
        also account for uncertainty in the underlying data sources. To further 
        account for uncertainty in the historical values, the most permissible 
        source of all sources for each variable, region, and period is used to 
        set the threshold.


        The threshold for 2025 is set to the value reported for 2020.
Land Cover:
    justification_criterion: >-
        This scenario reports land cover that is inconsistent with historical 
        values. This is a concern because the underlying modelling likely makes 
        false assumptions on land cover today and the efforts needed to reduce 
        emissions while feeding the planet.
    justification_threshold: >-
        Historical values for land cover are provided by {{cite:LUH2-2020}},
        {{cite:LUH2-GCB-2025}}, {{cite:LUH3}}, and {{cite:FAOSTAT-2025}}.
        
        
        The thresholds are derived from these sources as follows:

        • 2010, 2015, and 2020: ±10% deviation for land cover and ±20% for 
        crop-land cover.

        • 2025: ±20% deviation for land cover and ±30% for crop-land cover.


        Note that these ranges not only give models some leeway to deviate, but 
        also account for uncertainty in the underlying data sources. To further 
        account for uncertainty in the historical values, the most permissible 
        source of all sources for each variable, region, and period is used to 
        set the threshold.


        The threshold for 2025 is set to the value reported for 2020.
